name: Supabase Keep Alive

on:
  schedule:
    - cron: "0 0 */3 * *"   # toutes les 3 jours
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          curl "https://mjhjpwnvbcarhdqpfdvq.supabase.co/rest/v1/reservations?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"